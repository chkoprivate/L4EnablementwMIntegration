version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: LocalPostgresDB
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  pg_data:
